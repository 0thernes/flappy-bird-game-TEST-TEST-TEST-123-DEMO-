name: Dependabot auto-merge

# Hands-free dependency maintenance: once CI ("Smoke check") passes, every
# Dependabot PR — patch, minor, or major — merges itself. Branch protection is
# the safety gate; nothing red can land. Full PR + CI history is preserved.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    steps:
      - name: Enable auto-merge for the Dependabot PR
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
